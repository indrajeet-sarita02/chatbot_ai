<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body {
    background:#e0e0e0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.chat-container {
    width:480px;
    height:800px;
    background:#fff;
    display:flex;
    flex-direction:column;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,.12);
}

.header {
    padding:16px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#075E54;
    color:#fff;
}

.header h2 {
    font-size:18px;
    font-weight:600;
}

.chat-area {
    flex:1;
    overflow-y:auto;
    padding:20px;
    background:#f5f0eb;
}

.message {
    display:flex;
    margin-bottom:16px;
}

.left-msg { justify-content:flex-start; }
.right-msg { justify-content:flex-end; }

.bubble {
    max-width:75%;
    padding:12px 16px;
    border-radius:16px;
    font-size:15px;
    line-height:1.5;
    word-wrap:break-word;
}

.bot-bubble {
    background:#fff;
    color:#303030;
    border-radius:16px 16px 16px 4px;
    box-shadow:0 1px 2px rgba(0,0,0,.08);
}

.user-bubble {
    background:#DCF8C6;
    color:#303030;
    border-radius:16px 16px 4px 16px;
}

.footer {
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 16px;
    border-top:1px solid #e0e0e0;
    background:#f0f0f0;
}

.footer input {
    flex:1;
    border:none;
    border-radius:24px;
    padding:12px 18px;
    font-size:15px;
    background:#fff;
    outline:none;
}

.footer button {
    width:44px;
    height:44px;
    border-radius:50%;
    background:#25D366;
    color:#fff;
    border:none;
    font-size:20px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}

.footer button:hover {
    background:#1da851;
}
</style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h2>🛍️ ShopEase Assistant</h2>
        <span>✓</span>
    </div>

    <div class="chat-area">
        <div class="message left-msg">
            <div class="bubble bot-bubble">Hello! How can I help you today?</div>
        </div>
        <div class="message right-msg">
            <div class="bubble user-bubble">Show me Bluetooth headphones under ₹3000</div>
        </div>
        <div class="message left-msg">
            <div class="bubble bot-bubble">
                Here are some options:<br><br>
                🔹 BoAt Rockerz 550 - ₹2,499<br>
                🔹 Noise ColorFit - ₹1,999<br>
                🔹 realme Buds 2 - ₹2,299<br><br>
                Would you like more details on any?
            </div>
        </div>
    </div>

    <div class="footer">
        <input type="text" placeholder="Type a message...">
        <button>➤</button>
    </div>
</div>

</body>
</html>
